<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ten&See — Admin</title>
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #0c0e12;
      --surface: #13161d;
      --surface2: #1a1e28;
      --border: rgba(255,255,255,0.06);
      --border-accent: rgba(201,168,76,0.3);
      --gold: #C9A84C;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201,168,76,0.12);
      --text: #e8eaf0;
      --text-muted: #6b7280;
      --text-dim: #9ca3af;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --navy: #1B2E4B;
      --radius: 12px;
      --radius-lg: 18px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    /* Light Mode Colors */
    html.light-mode {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --surface2: #f3f4f6;
      --border: rgba(0,0,0,0.08);
      --border-accent: rgba(201,168,76,0.4);
      --text: #1f2937;
      --text-muted: #6b7280;
      --text-dim: #6b7280;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background-color var(--transition), color var(--transition);
    }

    /* ── LAYOUT ── */
    .layout { display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      z-index: 200;
      transition: transform var(--transition), background-color var(--transition), border-color var(--transition);
    }

    .sidebar-logo {
      padding: 1.5rem 1.25rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--gold);
      letter-spacing: -0.5px;
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
    }
    .logo-text img { width: 44px; height: 44px; object-fit: contain; border-radius: 10px; display: block; }
    .logo-sub { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }

    .sidebar-nav { flex: 1; padding: 0.75rem 0; overflow-y: auto; }

    .nav-section-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      padding: 0.75rem 1.25rem 0.25rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 1.25rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      border-left: 3px solid transparent;
      font-size: 0.875rem;
      font-weight: 500;
      user-select: none;
      position: relative;
    }
    .nav-item:hover { color: var(--text); background: rgba(201,168,76,0.05); }
    .nav-item.active { color: var(--gold); background: var(--gold-dim); border-left-color: var(--gold); }
    .nav-item i { width: 18px; text-align: center; font-size: 0.85rem; }
    .nav-badge {
      margin-left: auto;
      background: var(--danger);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 100px;
      min-width: 18px;
      text-align: center;
    }

    .sidebar-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
    }
    .admin-profile {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .admin-avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem;
      color: var(--navy);
      flex-shrink: 0;
    }
    .admin-name { font-size: 0.85rem; font-weight: 600; }
    .admin-role { font-size: 0.7rem; color: var(--text-muted); }
    .btn-logout {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.35rem 0.6rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* ── MAIN ── */
    .main { flex: 1; margin-left: 240px; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(12,14,18,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: background-color var(--transition), border-color var(--transition);
    }

    html.light-mode .topbar {
      background: rgba(248,249,250,0.85);
    }

    .topbar-title { font-size: 1.1rem; font-weight: 600; }
    .topbar-subtitle { font-size: 0.8rem; color: var(--text-muted); }
    .topbar-actions { display: flex; align-items: center; gap: 0.75rem; }

    .notif-btn {
      position: relative;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      font-size: 0.85rem;
    }
    .notif-btn:hover { color: var(--gold); border-color: var(--border-accent); }
    .notif-dot {
      position: absolute;
      top: 6px; right: 6px;
      width: 8px; height: 8px;
      background: var(--danger);
      border-radius: 50%;
      border: 2px solid var(--bg);
      display: none;
    }
    .notif-dot.visible { display: block; }

    /* Theme Toggle Button */
    .theme-toggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      font-size: 0.85rem;
      position: relative;
      overflow: hidden;
    }
    .theme-toggle:hover { color: var(--gold); border-color: var(--border-accent); }
    .theme-icon { position: absolute; transition: opacity var(--transition), transform var(--transition); }
    .theme-icon.hidden { opacity: 0; transform: scale(0.5); }
    .theme-icon.visible { opacity: 1; transform: scale(1); }

    /* ── CONTENT ── */
    .content { flex: 1; padding: 2rem; }

    .section { display: none; }
    .section.active { display: block; }

    /* ── STATS GRID ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      transition: all var(--transition);
      cursor: default;
    }
    .stat-card:hover { border-color: var(--border-accent); transform: translateY(-2px); box-shadow: var(--shadow); }
    .stat-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
    .stat-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
    }
    .si-gold { background: var(--gold-dim); color: var(--gold); }
    .si-blue { background: rgba(59,130,246,0.12); color: var(--info); }
    .si-green { background: rgba(34,197,94,0.12); color: var(--success); }
    .si-red { background: rgba(239,68,68,0.12); color: var(--danger); }
    .si-orange { background: rgba(245,158,11,0.12); color: var(--warning); }
    .si-purple { background: rgba(168,85,247,0.12); color: #a855f7; }

    .stat-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 100px;
    }
    .badge-up { background: rgba(34,197,94,0.12); color: var(--success); }
    .badge-down { background: rgba(239,68,68,0.12); color: var(--danger); }
    .badge-neutral { background: rgba(107,114,128,0.15); color: var(--text-muted); }

    .stat-value {
      font-family: 'DM Mono', monospace;
      font-size: 1.75rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); }

    /* ── GRID ── */
    .two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: background-color var(--transition), border-color var(--transition);
    }
    .card-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .card-title { font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
    .card-title i { color: var(--gold); font-size: 0.85rem; }
    .card-body { padding: 1.25rem; }
    .card-body.no-pad { padding: 0; }

    /* ── TABLE ── */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      text-align: left;
      padding: 0.75rem 1.25rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .data-table td {
      padding: 0.875rem 1.25rem;
      font-size: 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      vertical-align: middle;
    }

    html.light-mode .data-table td {
      border-bottom: 1px solid rgba(0,0,0,0.02);
    }

    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(255,255,255,0.015); }

    html.light-mode .data-table tr:hover td { background: rgba(0,0,0,0.03); }

    .cell-primary { font-weight: 600; }
    .cell-muted { color: var(--text-muted); font-size: 0.78rem; margin-top: 2px; }

    /* ── BADGES ── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-new { background: rgba(59,130,246,0.12); color: var(--info); }
    .badge-contacted { background: rgba(245,158,11,0.12); color: var(--warning); }
    .badge-converted { background: rgba(34,197,94,0.12); color: var(--success); }
    .badge-closed { background: rgba(107,114,128,0.12); color: var(--text-muted); }
    .badge-viewing { background: rgba(168,85,247,0.12); color: #a855f7; }
    .badge-pending { background: rgba(245,158,11,0.12); color: var(--warning); }
    .badge-confirmed { background: rgba(34,197,94,0.12); color: var(--success); }
    .badge-cancelled { background: rgba(239,68,68,0.12); color: var(--danger); }
    .badge-completed { background: rgba(59,130,246,0.12); color: var(--info); }
    .badge-active { background: rgba(34,197,94,0.12); color: var(--success); }
    .badge-inactive { background: rgba(107,114,128,0.12); color: var(--text-muted); }
    .badge-deposit_paid { background: rgba(168,85,247,0.12); color: #a855f7; }
    .badge-fully_paid { background: rgba(34,197,94,0.2); color: var(--success); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      font-weight: 600; font-size: 0.825rem;
      cursor: pointer; border: none;
      transition: all var(--transition);
      font-family: inherit;
      white-space: nowrap;
    }
    .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--navy); }
    .btn-gold:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-ghost { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border-accent); color: var(--gold); }
    .btn-danger-ghost { background: rgba(239,68,68,0.08); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
    .btn-danger-ghost:hover { background: rgba(239,68,68,0.15); }
    .btn-success-ghost { background: rgba(34,197,94,0.08); color: var(--success); border: 1px solid rgba(34,197,94,0.2); }
    .btn-success-ghost:hover { background: rgba(34,197,94,0.15); }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.78rem; }
    .btn-icon { padding: 0.35rem; width: 30px; height: 30px; justify-content: center; }

    /* ── FORMS ── */
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-dim); margin-bottom: 0.4rem; }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.625rem 0.875rem;
      color: var(--text);
      font-size: 0.875rem;
      outline: none;
      font-family: inherit;
      transition: border-color var(--transition), background-color var(--transition);
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--border-accent); }
    .form-select option { background: var(--surface2); }
    .form-textarea { min-height: 80px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.875rem; }
    .form-check { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.875rem; }
    .form-check input { accent-color: var(--gold); width: 16px; height: 16px; cursor: pointer; }

    /* ── SEARCH ── */
    .search-box {
      display: flex; align-items: center; gap: 0.625rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 0.875rem;
      transition: border-color var(--transition);
    }
    .search-box:focus-within { border-color: var(--border-accent); }
    .search-box i { color: var(--text-muted); font-size: 0.85rem; }
    .search-box input { background: none; border: none; color: var(--text); font-size: 0.875rem; outline: none; flex: 1; font-family: inherit; }
    .search-box input::placeholder { color: var(--text-muted); }

    /* ── TABS ── */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
    .tab {
      padding: 0.7rem 1rem;
      color: var(--text-muted);
      font-size: 0.825rem;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: none; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%; max-width: 680px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
      transition: background-color var(--transition), border-color var(--transition);
    }
    .modal-sm { max-width: 440px; }
    .modal-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--surface); z-index: 1;
    }
    .modal-title { font-size: 1rem; font-weight: 700; }
    .modal-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.25rem; cursor: pointer; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px; transition: all var(--transition);
    }
    .modal-close:hover { background: var(--surface2); color: var(--text); }
    .modal-body { padding: 1.5rem; }

    /* ── NOTIFICATIONS PANEL ── */
    .notif-panel {
      position: fixed; top: 60px; right: 1.5rem;
      width: 340px; max-height: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      z-index: 500;
      display: none;
      flex-direction: column;
      overflow: hidden;
      transition: background-color var(--transition), border-color var(--transition);
    }
    .notif-panel.active { display: flex; }
    .notif-panel-header {
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .notif-panel-title { font-size: 0.875rem; font-weight: 700; }
    .notif-list { flex: 1; overflow-y: auto; }
    .notif-item {
      padding: 0.875rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      cursor: pointer;
      transition: background var(--transition);
      display: flex; gap: 0.75rem; align-items: flex-start;
    }
    .notif-item:hover { background: rgba(255,255,255,0.02); }
    .notif-item.unread { background: var(--gold-dim); }
    .notif-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; flex-shrink: 0;
    }
    .notif-content { flex: 1; min-width: 0; }
    .notif-title-text { font-size: 0.825rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .notif-msg { font-size: 0.775rem; color: var(--text-muted); margin-top: 2px; }
    .notif-time { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; }

    /* ── CHART BAR ── */
    .bar-chart { display: flex; flex-direction: column; gap: 0.625rem; }
    .bar-row { display: flex; align-items: center; gap: 0.75rem; }
    .bar-label { font-size: 0.78rem; color: var(--text-dim); min-width: 100px; text-transform: capitalize; }
    .bar-track { flex: 1; height: 7px; background: rgba(255,255,255,0.06); border-radius: 100px; overflow: hidden; }

    html.light-mode .bar-track { background: rgba(0,0,0,0.06); }

    .bar-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
    .bar-count { font-size: 0.78rem; font-family: 'DM Mono', monospace; color: var(--text-muted); min-width: 30px; text-align: right; }

    /* ── FUNNEL ── */
    .funnel-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .funnel-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.625rem 0.875rem;
      background: var(--surface2);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .funnel-stage { font-size: 0.8rem; color: var(--text-dim); flex: 1; }
    .funnel-count { font-family: 'DM Mono', monospace; font-size: 0.875rem; font-weight: 500; min-width: 40px; text-align: right; }
    .funnel-rate { font-size: 0.72rem; color: var(--text-muted); min-width: 60px; text-align: right; }

    /* ── CHAT ── */
    .chat-layout { display: grid; grid-template-columns: 280px 1fr; height: 560px; }
    .chat-sessions { border-right: 1px solid var(--border); overflow-y: auto; }
    .chat-session-item {
      padding: 0.875rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      cursor: pointer;
      transition: background var(--transition);
      display: flex; gap: 0.75rem; align-items: flex-start;
    }
    .chat-session-item:hover { background: rgba(255,255,255,0.02); }
    .chat-session-item.active { background: var(--gold-dim); }
    .session-avatar {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.875rem; font-weight: 600;
      color: var(--gold);
      flex-shrink: 0;
    }
    .session-info { flex: 1; min-width: 0; }
    .session-name { font-size: 0.85rem; font-weight: 600; }
    .session-preview { font-size: 0.75rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .session-time { font-size: 0.7rem; color: var(--text-muted); }
    .unread-count {
      background: var(--danger); color: white;
      font-size: 0.65rem; font-weight: 700;
      padding: 1px 5px; border-radius: 100px;
      min-width: 16px; text-align: center;
    }

    .chat-main { display: flex; flex-direction: column; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); gap: 0.75rem; }
    .chat-empty i { font-size: 2rem; opacity: 0.4; }

    .msg-bubble { display: flex; gap: 0.5rem; max-width: 70%; }
    .msg-bubble.admin { align-self: flex-end; flex-direction: row-reverse; }
    .msg-content {
      padding: 0.625rem 0.875rem;
      border-radius: 14px;
      font-size: 0.85rem;
      line-height: 1.4;
    }
    .msg-bubble:not(.admin) .msg-content { background: var(--surface2); border-bottom-left-radius: 4px; }
    .msg-bubble.admin .msg-content { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--navy); font-weight: 500; border-bottom-right-radius: 4px; }
    .msg-time { font-size: 0.65rem; color: var(--text-muted); align-self: flex-end; margin-bottom: 2px; }

    .chat-input-area {
      padding: 0.875rem;
      border-top: 1px solid var(--border);
      display: flex; gap: 0.625rem;
    }

    /* ── BOOKING CARD ── */
    .booking-row-detail { padding: 0.75rem 1.25rem; background: var(--surface2); border-radius: var(--radius); margin-bottom: 0.5rem; }
    .booking-row-detail .label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 2px; }
    .booking-row-detail .value { font-size: 0.875rem; font-weight: 600; }

    /* ── AUDIT LOG ── */
    .audit-item {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      display: flex; align-items: flex-start; gap: 0.75rem;
    }
    .audit-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .audit-content { flex: 1; }
    .audit-action { font-size: 0.825rem; font-weight: 600; }
    .audit-detail { font-size: 0.775rem; color: var(--text-muted); }
    .audit-time { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; }

    /* ── EMPTY STATE ── */
    .empty-state { padding: 3rem; text-align: center; color: var(--text-muted); }
    .empty-state i { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.35; display: block; }
    .empty-state p { font-size: 0.875rem; }

    /* ── LOADING ── */
    .loading { display: flex; align-items: center; justify-content: center; padding: 3rem; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOOLBAR ── */
    .toolbar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .toolbar .search-box { flex: 1; min-width: 200px; }

    /* ── TOAST ── */
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      display: flex; align-items: center; gap: 0.75rem;
      font-size: 0.85rem; min-width: 260px;
      animation: slideIn 0.3s ease; box-shadow: var(--shadow);
    }
    .toast.success { border-color: rgba(34,197,94,0.3); }
    .toast.error { border-color: rgba(239,68,68,0.3); }
    .toast i { font-size: 1rem; }
    .toast.success i { color: var(--success); }
    .toast.error i { color: var(--danger); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: none; opacity: 1; } }

    /* ── LOGIN PAGE ── */
    .login-page {
      min-height: 100vh;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%; max-width: 380px;
      box-shadow: var(--shadow);
    }
    .login-logo { text-align: center; margin-bottom: 2rem; }
    .login-logo .logo-text { font-size: 2rem; justify-content: center; flex-direction: column; gap: 0.75rem; }
    .login-logo .logo-text img { width: 86px; height: 86px; border-radius: 16px; }
    .login-logo p { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }
    .login-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius); padding: 0.625rem 0.875rem; font-size: 0.825rem; color: var(--danger); margin-bottom: 1rem; display: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) { .two-col { grid-template-columns: 1fr; } .three-col { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: none; }
      .main { margin-left: 0; }
      .chat-layout { grid-template-columns: 1fr; height: auto; }
    }
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .three-col { grid-template-columns: 1fr; }
      .topbar { padding: 0.75rem 1rem; font-size: 0.9rem; }
      .topbar-title { font-size: 1rem; }
      .topbar-actions { gap: 0.5rem; }
      .theme-toggle { width: 32px; height: 32px; }
      .msg-bubble { max-width: 85%; }
    }
  </style>
</head>
<body>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Notification Sound -->
<audio id="notifSound" preload="auto"><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg"></audio>

<!-- Notification Panel -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-panel-header">

<!-- ── MODALS ── -->

          <label class="form-label">Period</label>

            <option value="month">Per Month</option>

        <div class="form-group">

          <label class="form-label">Max Occupants</label>

        <div class="form-group">
          <label class="form-label">WhatsApp Number</label>

          <label class="form-label">Amenities (comma separated)</label>
          <input class="form-input" id="lAmenities" placeholder="WiFi, Parking, Gym, Laundry...">

        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Image URLs (comma separated)</label>
          <input class="form-input" id="lImages" placeholder="https://...">

        <div class="form-group">
          <label class="form-label">Available From</label>
          <input class="form-input" type="date" id="lFrom">
        </div>
        <div class="form-group">
          <label class="form-label">Available Until</label>
          <input class="form-input" type="date" id="lUntil">

</div>

<!-- Lead Modal -->
<div class="modal-overlay" id="leadModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <span class="modal-title">Lead Details</span>
      <button class="modal-close" onclick="closeModal('leadModal')">&times;</button>

</div>

  <div class="modal modal-sm">

      <span class="modal-title">Booking Details</span>

    </div>
    <div class="modal-body" id="bookingModalBody"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app"></div>

<script>
// ── STATE ──
const S = {
  token: localStorage.getItem('adminToken'),
  section: 'dashboard',
  listings: [], leads: [], bookings: [], notifications: [],
  chatSessions: [], currentSession: null,
  chatInterval: null,
  notifInterval: null,
  leadFilter: 'all', bookingFilter: 'all',
  adminName: localStorage.getItem('adminName') || 'Admin',
  theme: localStorage.getItem('theme') || 'auto'
};

// ── THEME SYSTEM ──
function initTheme() {
  const html = document.documentElement;
  const savedTheme = S.theme;

  if (savedTheme === 'light') {
    html.classList.add('light-mode');
  } else if (savedTheme === 'dark') {
    html.classList.remove('light-mode');
  } else {
    // Auto: detect device preference
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (!prefersDark) html.classList.add('light-mode');
  }
}

function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.classList.contains('light-mode');

  if (S.theme === 'auto') {
    S.theme = isLight ? 'dark' : 'light';
  } else if (S.theme === 'light') {
    S.theme = 'dark';
  } else {
    S.theme = 'auto';
  }

  localStorage.setItem('theme', S.theme);
  initTheme();
  updateThemeButton();
}

function updateThemeButton() {
  const html = document.documentElement;
  const isLight = html.classList.contains('light-mode');
  const btn = document.querySelector('.theme-toggle');

  if (!btn) return;

  const sunIcon = btn.querySelector('.sun-icon');
  const moonIcon = btn.querySelector('.moon-icon');

  if (isLight) {
    if (sunIcon) sunIcon.classList.add('visible');
    if (moonIcon) moonIcon.classList.add('hidden');
  } else {
    if (sunIcon) sunIcon.classList.add('hidden');
    if (moonIcon) moonIcon.classList.add('visible');
  }
}

// Listen for system preference changes
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (S.theme === 'auto') initTheme();
});

// ── API ──
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${S.token}`, ...opts.headers },
    ...opts
  });
  return res.json();
}

// ── TOAST ──
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── LOGIN PAGE ──
function renderLogin() {
  document.getElementById('app').innerHTML = `
    <div class="login-page">
      <div class="login-card">
        <div class="login-logo">
          <div class="logo-text"><img src="/assets/logo.png" alt="Ten&See logo"><span>Ten&See</span></div>
          <p>Admin Dashboard</p>
        </div>
        <div class="login-error" id="loginError"></div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" id="loginUser" placeholder="admin" onkeydown="if(event.key==='Enter')login()">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
        </div>
        <button class="btn btn-gold" style="width:100%;margin-top:0.5rem;" onclick="login()">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </div>
    </div>
  `;
  initTheme();
}

async function login() {
  const u = document.getElementById('loginUser').value;
  const p = document.getElementById('loginPass').value;
  try {
    const data = await api('/api/admin/login', { method: 'POST', body: JSON.stringify({ username: u, password: p }) });
    if (data.success) {
      localStorage.setItem('adminToken', data.token);
      S.token = data.token;
      S.adminName = u.charAt(0).toUpperCase() + u.slice(1);
      localStorage.setItem('adminName', S.adminName);
      renderApp();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('loginError').textContent = 'Invalid credentials. Please try again.';
    }
  } catch { toast('Connection error', 'error'); }
}

function logout() {
  localStorage.removeItem('adminToken');
  localStorage.removeItem('adminName');
  S.token = null;
  clearInterval(S.chatInterval);
  clearInterval(S.notifInterval);
  renderLogin();
}

// ── MAIN APP ──
function renderApp() {
  document.getElementById('app').innerHTML = `
    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
          <div class="logo-text"><img src="/assets/logo.png" alt="Ten&See logo"><span>Ten&See</span></div>
          <div class="logo-sub">Admin Panel</div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section-label">Overview</div>
          <div class="nav-item active" id="nav-dashboard" onclick="showSection('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
          <div class="nav-section-label">Manage</div>
          <div class="nav-item" id="nav-listings" onclick="showSection('listings')"><i class="fas fa-building"></i> Listings</div>
          <div class="nav-item" id="nav-leads" onclick="showSection('leads')"><i class="fas fa-users"></i> Leads</div>
          <div class="nav-item" id="nav-bookings" onclick="showSection('bookings')"><i class="fas fa-calendar-check"></i> Bookings</div>
          <div class="nav-item" id="nav-chat" onclick="showSection('chat')"><i class="fas fa-comments"></i> Live Chat <span class="nav-badge" id="chatBadge" style="display:none">0</span></div>
          <div class="nav-section-label">Insights</div>
          <div class="nav-item" id="nav-analytics" onclick="showSection('analytics')"><i class="fas fa-chart-bar"></i> Analytics</div>
          <div class="nav-item" id="nav-reports" onclick="showSection('reports')"><i class="fas fa-file-alt"></i> Reports</div>
          <div class="nav-item" id="nav-audit" onclick="showSection('audit')"><i class="fas fa-shield-alt"></i> Audit Log</div>
        </nav>
        <div class="sidebar-footer">
          <div class="admin-profile">
            <div class="admin-avatar">${S.adminName.charAt(0)}</div>
            <div>
              <div class="admin-name">${S.adminName}</div>
              <div class="admin-role">Administrator</div>
            </div>
            <button class="btn-logout" onclick="logout()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
          </div>
        </div>
      </aside>
      <div class="main">
        <header class="topbar">
          <div>
            <div class="topbar-title" id="topbarTitle">Dashboard</div>
            <div class="topbar-subtitle" id="topbarSub">Welcome back, ${S.adminName}</div>
          </div>
          <div class="topbar-actions">
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
              <i class="theme-icon sun-icon visible fas fa-sun"></i>
              <i class="theme-icon moon-icon hidden fas fa-moon"></i>
            </button>
            <button class="notif-btn" onclick="toggleNotifPanel()" title="Notifications">
              <i class="fas fa-bell"></i>
              <span class="notif-dot" id="notifDot"></span>
            </button>
          </div>
        </header>
        <div class="content">
          <div class="section active" id="sec-dashboard"></div>
          <div class="section" id="sec-listings"></div>
          <div class="section" id="sec-leads"></div>
          <div class="section" id="sec-bookings"></div>
          <div class="section" id="sec-chat"></div>
          <div class="section" id="sec-analytics"></div>
          <div class="section" id="sec-reports"></div>
          <div class="section" id="sec-audit"></div>
        </div>
      </div>
    </div>
  `;
  updateThemeButton();
  loadDashboard();
  pollNotifications();
  S.notifInterval = setInterval(pollNotifications, 30000);
}

// ── NAVIGATION ──
const TITLES = {
  dashboard: ['Dashboard', 'Platform overview'],
  listings: ['Listings', 'Manage property listings'],
  leads: ['Leads', 'Track customer inquiries'],
  bookings: ['Bookings', 'Manage booking requests'],
  chat: ['Live Chat', 'Customer conversations'],
  analytics: ['Analytics', 'Performance insights'],
  reports: ['Reports', 'Detailed data reports'],
  audit: ['Audit Log', 'Admin activity history']
};

function showSection(sec) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('nav-' + sec)?.classList.add('active');
  document.getElementById('sec-' + sec).classList.add('active');
  document.getElementById('topbarTitle').textContent = TITLES[sec][0];
  document.getElementById('topbarSub').textContent = TITLES[sec][1];
  S.section = sec;

  clearInterval(S.chatInterval);

  const loaders = {
    dashboard: loadDashboard, listings: loadListings, leads: loadLeads,
    bookings: loadBookings, chat: () => { loadChat(); S.chatInterval = setInterval(() => { loadChatSessions(); if (S.currentSession) loadMessages(S.currentSession); }, 5000); },
    analytics: loadAnalytics, reports: loadReports, audit: loadAudit
  };
  loaders[sec]?.();

  // Close notif panel
  document.getElementById('notifPanel').classList.remove('active');
}

// ── DASHBOARD ──
async function loadDashboard() {
  const sec = document.getElementById('sec-dashboard');
  sec.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
  try {
    const [dash, comp] = await Promise.all([
      api('/api/analytics/dashboard'),
      api('/api/reports/comparison')
    ]);
    const d = dash.data; const c = comp.data;

    sec.innerHTML = `
      <div class="stats-grid">
        ${statCard('fa-users', 'si-gold', d.totalLeads, 'Total Leads', c?.changes?.leads, '%')}
        ${statCard('fa-star', 'si-blue', d.newLeads, 'New Leads (7d)', null)}
        ${statCard('fa-building', 'si-green', d.totalListings, 'Active Listings', null)}
        ${statCard('fa-eye', 'si-orange', (d.totalViews||0).toLocaleString(), 'Total Views', c?.changes?.views, '%')}
        ${statCard('fa-calendar-check', 'si-purple', d.totalBookings ?? '-', 'Total Bookings', c?.changes?.bookings, '%')}
        ${statCard('fa-comments', 'si-gold', d.totalChats ?? '-', 'Chat Sessions', null)}
      </div>
      <div class="two-col">
        <div class="card">
          <div class="card-header">
            <span class="card-title"><i class="fas fa-clock"></i> Recent Leads</span>
            <button class="btn btn-ghost btn-sm" onclick="showSection('leads')">View All</button>
          </div>
          <div class="card-body no-pad">
            <table class="data-table">
              <thead><tr><th>Name</th><th>Source</th><th>Status</th><th>Date</th></tr></thead>
              <tbody>
                ${(d.recentLeads||[]).map(l => `
                  <tr>
                    <td><div class="cell-primary">${l.name}</div><div class="cell-muted">${l.email}</div></td>
                    <td><span style="font-size:0.8rem;color:var(--text-muted);text-transform:capitalize;">${l.source?.replace('_',' ')}</span></td>
                    <td>${statusBadge(l.status)}</td>
                    <td style="color:var(--text-muted);font-size:0.8rem;">${fmtDate(l.createdAt)}</td>
                  </tr>
                `).join('') || '<tr><td colspan="4" class="empty-state"><i class="fas fa-inbox"></i><p>No leads yet</p></td></tr>'}
              </tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title"><i class="fas fa-chart-pie"></i> Lead Sources</span></div>
          <div class="card-body">
            <div class="bar-chart">
              ${(d.leadSources||[]).map(src => `
                <div class="bar-row">
                  <div class="bar-label">${src._id}</div>
                  <div class="bar-track"><div class="bar-fill" style="width:${(src.count/(Math.max(...(d.leadSources||[]).map(s=>s.count),1)))*100}%"></div></div>
                  <div class="bar-count">${src.count}</div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      </div>
    `;
  } catch(e) { console.error(e); sec.innerHTML = '<div class="empty-state"><i class="fas fa-alert-circle"></i><p>Error loading dashboard</p></div>'; }
}

// ── HELPERS ──
function statCard(icon, color, value, label, change, unit) {
  return `
    <div class="stat-card">
      <div class="stat-row">
        <div class="stat-icon ${color}"><i class="fas ${icon}"></i></div>
        ${change !== null ? `<span class="stat-badge ${change >= 0 ? 'badge-up' : 'badge-down'}"><i class="fas fa-arrow-${change >= 0 ? 'up' : 'down'}"></i> ${Math.abs(change)}${unit}</span>` : ''}
      </div>
      <div class="stat-value">${value}</div>
      <div class="stat-label">${label}</div>
    </div>
  `;
}

function statusBadge(status) {
  return `<span class="badge badge-${status}">${status?.replace('_', ' ')}</span>`;
}

function fmtDate(d) { return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }

function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function openModal(id) { document.getElementById(id).classList.add('active'); }

function toggleNotifPanel() { document.getElementById('notifPanel').classList.toggle('active'); }

async function markAllRead() { /* API call */ }
async function loadListings() { document.getElementById('sec-listings').innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>Loading listings...</p></div>'; }
async function loadLeads() { document.getElementById('sec-leads').innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>Loading leads...</p></div>'; }
async function loadBookings() { document.getElementById('sec-bookings').innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>Loading bookings...</p></div>'; }

async function loadChatSessions() { /* API call */ }
async function loadMessages(id) { /* API call */ }
async function loadAnalytics() { document.getElementById('sec-analytics').innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>Loading analytics...</p></div>'; }
async function loadReports() { document.getElementById('sec-reports').innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>Loading reports...</p></div>'; }
async function loadAudit() { document.getElementById('sec-audit').innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>Loading audit log...</p></div>'; }
